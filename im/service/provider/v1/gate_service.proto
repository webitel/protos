syntax = "proto3";

package webitel.im.provider.v1;

import "google/api/annotations.proto";
import "service/provider/v1/entities.proto";
import "service/provider/v1/messages.proto";

option go_package = "github.com/webitel/im-provider-service/gen/go/api/v1;impb";

// GateService provides methods to list and manage all registered messaging gateways across different providers (Telegram, Facebook, etc.) within the current domain. It serves as a unified interface for gateway management, abstracting away provider-specific details.
service GateService {
  /// ListGates returns a collection of all registered gateways within the current domain.
  rpc ListGates (ProviderListGatesRequest) returns (ProviderListGatesResponse) {
    option (google.api.http) = { get: "/im/gates" };
  }
}