syntax = "proto3";

package webitel.im.provider.v1;

import "service/provider/v1/enums.proto";

option go_package = "github.com/webitel/im-provider-service/gen/go/api/v1;impb";

// --- Base Entities ---

message ProviderSummary {
  string id = 1;
  string name = 2;
  webitel.im.provider.v1.ProviderType type = 3;
  webitel.im.provider.v1.ProviderStatus status = 4;
  string webhook_url = 5; 
  string contact = 6; 
  string provider_app_id = 7; 
  int64 created_at = 8; // Unix timestamp in milliseconds
  int64 updated_at = 9; // Unix timestamp in milliseconds
}

message ProviderMetaApp {
  string id = 1;
  string name = 2;
  string app_id = 3;
  string system_user_token = 5;
  string oauth_redirect_uri = 6;
  repeated string scopes = 7;
  int64 created_at = 8; // Unix timestamp in milliseconds
  int64 updated_at = 9; // Unix timestamp in milliseconds
}

message ProviderFacebookGate {
  string id = 1;
  string name = 2;
  string meta_app_id = 3;
  string page_id = 4;
  string page_name = 5;
  string webhook = 7;
  webitel.im.provider.v1.ProviderStatus status = 8;
  int64 created_at = 9; // Unix timestamp in milliseconds
  int64 updated_at = 10; // Unix timestamp in milliseconds
  bool enabled = 11;
}

message ProviderWhatsAppGate {
  string id = 1;
  string name = 2;
  string meta_app_id = 3;
  string waba_id = 4;
  string phone_number_id = 5;
  string phone_display = 6;
  webitel.im.provider.v1.ProviderStatus status = 8;
  int64 created_at = 9; // Unix timestamp in milliseconds
  int64 updated_at = 10; // Unix timestamp in milliseconds
}