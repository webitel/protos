syntax = "proto3";

package webitel.im.provider.v1;

import "google/api/annotations.proto";
import "service/provider/v1/enums.proto";

option go_package = "github.com/webitel/im-provider-service/gen/go/api/v1;impb";

// InboundMessageService handles incoming messages from external platforms.
service ProviderMessageService {

  // SendText delivers a plain text message to the external chat partner.
  rpc SendText(ProviderSendTextRequest) returns (ProviderSendMessageResponse) {
    option (google.api.http) = {
      post: "/im/provider/send/text"
      body: "*"
    };
  }

  // SendDocument delivers file attachments to the external chat partner.
  rpc SendDocument(ProviderSendDocumentRequest) returns (ProviderSendMessageResponse) {
    option (google.api.http) = {
      post: "/im/provider/send/document"
      body: "*"
    };
  }

  // SendImage delivers images to the external chat partner.
  rpc SendImage(ProviderSendImageRequest) returns (ProviderSendMessageResponse) {
    option (google.api.http) = {
      post: "/im/provider/send/image"
      body: "*"
    };
  }

  // SendInteractive delivers a message with interactive UI elements (buttons, menus).
  rpc SendInteractive(ProviderSendInteractiveRequest) returns (ProviderSendMessageResponse) {
    option (google.api.http) = {
      post: "/im/provider/send/interactive"
      body: "*"
    };
  }

  // SendSystemMessage delivers a system event notification to the external chat partner.
  // The im-providers-service resolves the gate-specific template and renders it as text
  // before forwarding to the underlying provider (Facebook, WhatsApp, etc.).
  rpc SendSystemMessage(ProviderSendSystemMessageRequest) returns (ProviderSendMessageResponse) {
    option (google.api.http) = {
      post: "/im/provider/send/system"
      body: "*"
    };
  }
}

// --- Shared Types ---

// ProviderSendMessageResponse returns the delivery status and external message ID.
message ProviderSendMessageResponse {
  string external_id = 1; // The ID assigned by the external platform (Meta, Telegram, etc.)
  int64 created_at = 2; // Unix timestamp of message creation
}

// ProviderFile represents a generic file attachment.
message ProviderFile {
  string id = 1; // Internal Webitel file storage ID
  string url = 2; // Publicly accessible URL (if required by provider)
  string name = 3; // Original file name
  string mime_type = 4; // Media type (e.g., "image/png")
  int64 size = 5; // File size in bytes
}

// --- Requests ---

// ProviderSendTextRequest sends a simple text message.
message ProviderSendTextRequest {
  ProviderType type = 1; // Explicit provider type (FACEBOOK, WHATSAPP, etc.)
  string gate_id = 2; // Internal ID of the specific configured gateway
  string external_user_id = 3; // Recipient's platform-specific identifier
  string text = 4; // The textual content of the message
  int32 domain_id = 5;

  // Internal message context for per-recipient delivery status tracking:
  // the provider service persists the provider_message_id mapping on send
  // and reports MarkDelivered/MarkRead/MarkFailed receipts back to im-thread.
  string message_id = 6; // Internal message UUID
  string thread_id = 7; // Internal thread UUID

  map<string, string> metadata = 10; // Optional platform-specific parameters

  string reply_to_external_id = 11;
}

// ProviderSendDocumentRequest sends a document with an optional caption.
message ProviderSendDocumentRequest {
  ProviderType type = 1;
  string gate_id = 2;
  string external_user_id = 3;
  repeated ProviderFile documents = 4;
  string caption = 5; // Optional text accompanying the file
  int32 domain_id = 6;

  // Internal message context for per-recipient delivery status tracking.
  string message_id = 7; // Internal message UUID
  string thread_id = 8; // Internal thread UUID

  string reply_to_external_id = 11;
}

// ProviderSendImageRequest sends an image with an optional caption.
message ProviderSendImageRequest {
  ProviderType type = 1;
  string gate_id = 2;
  string external_user_id = 3;
  repeated ProviderFile images = 4;
  string caption = 5;
  int32 domain_id = 6;

  // Internal message context for per-recipient delivery status tracking.
  string message_id = 7; // Internal message UUID
  string thread_id = 8; // Internal thread UUID

  string reply_to_external_id = 11;
}

// ProviderSendInteractiveRequest sends a message with interactive UI elements.
message ProviderSendInteractiveRequest {
  string gate_id = 1;
  string external_user_id = 2;
  int32 domain_id = 3;

  // Optional text body displayed above the interactive element.
  optional string body = 4;

  // Optional idempotency key to prevent duplicate delivery.
  optional string send_id = 5;

  // Interactive payload — exactly one kind must be set.
  ProviderInteractive interactive = 6;

  // Internal message context for per-recipient delivery status tracking.
  string message_id = 7; // Internal message UUID
  string thread_id = 8; // Internal thread UUID

  string reply_to_external_id = 11;
}

// ProviderInteractive carries the interactive UI definition.
message ProviderInteractive {
  // When true the keyboard is hidden after the user interacts once.
  bool single_use = 1;

  oneof kind {
    ProviderKeyboardMarkup markup = 2;
    ProviderKeyboardListReply list_reply = 3;
  }
}

// ProviderKeyboardMarkup is a grid of button rows.
message ProviderKeyboardMarkup {
  repeated ProviderKeyboardRow rows = 1;
}

// ProviderKeyboardListReply is a dropdown-style menu with labeled sections.
message ProviderKeyboardListReply {
  // Label of the main button that expands the list.
  string main_button_title = 1;
  repeated ProviderKeyboardRowWithSection sections = 2;
}

// ProviderKeyboardRow is a horizontal row of buttons.
message ProviderKeyboardRow {
  repeated ProviderKeyboardButton buttons = 1;
}

// ProviderKeyboardRowWithSection is a titled group of buttons.
message ProviderKeyboardRowWithSection {
  string section = 1;
  repeated ProviderKeyboardButton buttons = 2;
}

// ProviderKeyboardButton is a single interactive element.
message ProviderKeyboardButton {
  // Unique identifier returned in SendInteractiveCallback.
  string id = 1;
  // Display label on the button.
  string label = 2;

  oneof kind {
    ProviderKeyboardButtonURL url = 3;
    ProviderKeyboardButtonCallback callback = 4;
    ProviderKeyboardButtonRequest request = 5;
  }
}

// ProviderKeyboardButtonURL opens a web page when clicked.
message ProviderKeyboardButtonURL {
  string url = 1;
}

// ProviderKeyboardButtonCallback sends a backend event when clicked.
message ProviderKeyboardButtonCallback {
  string data = 1;
}

// ProviderKeyboardButtonRequest prompts the user for device data (location, phone, email).
message ProviderKeyboardButtonRequest {
  string action = 1;
}

// ProviderSendSystemMessageRequest delivers a system event to the external chat partner.
// The provider service resolves the gate-specific template and renders the final text
// using the supplied variables before sending via the underlying provider API.
message ProviderSendSystemMessageRequest {
  // Internal ID of the configured gateway.
  string gate_id = 1;
  // Recipient's platform-specific user identifier.
  string external_user_id = 2;
  int32 domain_id = 3;
  // System event type (e.g., "member_added", "member_removed", "transferred").
  // Used to look up the gate-specific template or fall back to the built-in default.
  string event_type = 4;
  // Template variables sourced from the system message metadata.
  // Injected into the template via Go text/template syntax (e.g. {{.new_member_role}}).
  map<string, string> vars = 5;

  // Internal message context for per-recipient delivery status tracking.
  string message_id = 6; // Internal message UUID
  string thread_id = 7; // Internal thread UUID
}
