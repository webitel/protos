syntax = "proto3";

package webitel.im.provider.v1;

import "google/api/annotations.proto";
import "service/provider/v1/entities.proto";
import "service/provider/v1/messages.proto";

option go_package = "github.com/webitel/im-provider-service/gen/go/api/v1;impb";

/// FacebookService defines the RPC methods for managing Facebook Messenger gateways.
service FacebookService {
  /// CreateFacebookGate activates a Facebook Messenger gateway for a specific Page.
  rpc CreateFacebookGate (webitel.im.provider.v1.ProviderCreateFacebookGateRequest) returns (webitel.im.provider.v1.ProviderCreateFacebookGateResponse) {
    option (google.api.http) = { post: "/im/gates/facebook", body: "*" };
  }

  /// GetFacebookGate retrieves details of a specific Facebook gateway.
  rpc GetFacebookGate (webitel.im.provider.v1.ProviderGetFacebookGateRequest) returns (webitel.im.provider.v1.ProviderGetFacebookGateResponse) {
    option (google.api.http) = { get: "/im/gates/facebook/{id}" };
  }

  /// UpdateFacebookGate modifies Facebook gateway settings.
  rpc UpdateFacebookGate (webitel.im.provider.v1.ProviderUpdateFacebookGateRequest) returns (webitel.im.provider.v1.ProviderUpdateFacebookGateResponse) {
    option (google.api.http) = { patch: "/im/gates/facebook/{id}", body: "*" };
  }

  /// DeleteFacebookGate deactivates the gateway.
  rpc DeleteFacebookGate (webitel.im.provider.v1.ProviderDeleteFacebookGateRequest) returns (webitel.im.provider.v1.ProviderDeleteFacebookGateResponse) {
    option (google.api.http) = { delete: "/im/gates/facebook/{id}" };
  }

  /// SetPersistentMenu sets the Messenger persistent menu for a Facebook gate.
  rpc SetPersistentMenu (webitel.im.provider.v1.ProviderSetPersistentMenuRequest) returns (webitel.im.provider.v1.ProviderSetPersistentMenuResponse) {
    option (google.api.http) = { put: "/im/gates/facebook/{gate_id}/menu", body: "*" };
  }

  /// DeletePersistentMenu removes the Messenger persistent menu for a Facebook gate.
  rpc DeletePersistentMenu (webitel.im.provider.v1.ProviderDeletePersistentMenuRequest) returns (webitel.im.provider.v1.ProviderDeletePersistentMenuResponse) {
    option (google.api.http) = { delete: "/im/gates/facebook/{gate_id}/menu" };
  }

  /// SetGetStarted sets the Get Started button payload for a Facebook gate.
  rpc SetGetStarted (webitel.im.provider.v1.ProviderSetGetStartedRequest) returns (webitel.im.provider.v1.ProviderSetGetStartedResponse) {
    option (google.api.http) = { put: "/im/gates/facebook/{gate_id}/get-started", body: "*" };
  }

  /// DeleteGetStarted removes the Get Started button for a Facebook gate.
  rpc DeleteGetStarted (webitel.im.provider.v1.ProviderDeleteGetStartedRequest) returns (webitel.im.provider.v1.ProviderDeleteGetStartedResponse) {
    option (google.api.http) = { delete: "/im/gates/facebook/{gate_id}/get-started" };
  }
}

message ProviderSetPersistentMenuRequest {
  string gate_id = 1;
  repeated ProviderMenuItem items = 2;
  bool composer_input_disabled = 3;
}
message ProviderSetPersistentMenuResponse {}

message ProviderDeletePersistentMenuRequest {
  string gate_id = 1;
}
message ProviderDeletePersistentMenuResponse {}

message ProviderSetGetStartedRequest {
  string gate_id = 1;
  string payload = 2;
}
message ProviderSetGetStartedResponse {}

message ProviderDeleteGetStartedRequest {
  string gate_id = 1;
}
message ProviderDeleteGetStartedResponse {}

message ProviderMenuItem {
  string title = 1;
  oneof action {
    string payload = 2;
    string url = 3;
    ProviderMenuNestedItems nested = 4;
  }
}

message ProviderMenuNestedItems {
  repeated ProviderMenuItem items = 1;
}