syntax = "proto3";

package webitel.im.provider.v1;

option go_package = "github.com/webitel/im-provider-service/gen/go/api/v1;impb";

/// ProviderType defines the specific provider or protocol used for messaging.
enum ProviderType {
  PROVIDER_TYPE_UNSPECIFIED  = 0;
  PROVIDER_TYPE_VIBER        = 1;
  PROVIDER_TYPE_TELEGRAM_BOT = 2;
  PROVIDER_TYPE_TELEGRAM_APP = 3;
  PROVIDER_TYPE_META_APP     = 4;
  PROVIDER_TYPE_FACEBOOK     = 5;
  PROVIDER_TYPE_INSTAGRAM    = 6;
  PROVIDER_TYPE_WHATSAPP     = 7;
}

/// ProviderStatus represents the operational state of a provider gateway.
enum ProviderStatus {
  PROVIDER_STATUS_UNSPECIFIED = 0;
  PROVIDER_STATUS_ACTIVE      = 1; // Provider is healthy and processing messages
  PROVIDER_STATUS_INACTIVE    = 2; // Manually disabled by user
  PROVIDER_STATUS_ERROR       = 3; // Connection or authentication failed
}