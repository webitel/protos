syntax = "proto3";
package webitel.im.service.thread.v1;
import "service/thread/v1/thread_permission.proto";

option go_package = "github.com/webitel/im-thread-service/gen/go/api/v1;impb";

enum ThreadRole {
  ROLE_UNSPECIFIED = 0;
  ROLE_MEMBER      = 1;
  ROLE_ADMIN       = 2;
  ROLE_OWNER       = 3;
  ROLE_SUPERVISOR  = 4;
}

// MessageDeliveryStatus is a per-recipient delivery state of a message.
// Transitions are monotonic: SENT -> DELIVERED -> READ.
// FAILED is terminal but may be superseded by a later DELIVERED (retry).
enum MessageDeliveryStatus {
  MESSAGE_DELIVERY_STATUS_UNSPECIFIED = 0;
  // Accepted by the system and queued for delivery.
  MESSAGE_DELIVERY_STATUS_SENT        = 1;
  // Reached the recipient (stream ACK, push, provider receipt, bot dispatch).
  MESSAGE_DELIVERY_STATUS_DELIVERED   = 2;
  // Read by the recipient. Not applicable to bots.
  MESSAGE_DELIVERY_STATUS_READ        = 3;
  // Delivery failed (provider rejected, invalid contact, channel restriction).
  MESSAGE_DELIVERY_STATUS_FAILED      = 4;
}

// ThreadMember represents a thread participant
// with optional type-specific settings.
message ThreadMember {
  // Unique identifier of the thread member record. (thread_dialog_id)
  string id = 1;
  // Contact ID of the thread member.
  string contact_id = 2;
  // Role of the member in the thread, determining their permissions.
  ThreadRole role = 4;
  // User rights in the thread, determined by their role.
  ThreadPermissions permissions = 5;
  // Whether this member is a bot contact.
  bool is_bot = 6;
  // Whether this member will automatically leave the thread after their bot schema completes.
  bool auto_leave = 7;
  // Whether this member is the current active bot controller for the thread.
  bool is_active_controller = 8;
}
