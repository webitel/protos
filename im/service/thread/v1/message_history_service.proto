syntax = "proto3";
package webitel.im.service.thread.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/any.proto";
import "google/protobuf/struct.proto";
import "service/thread/v1/message_service.proto";
import "service/thread/v1/peer.proto";
import "service/thread/v1/shared.proto";

option go_package = "github.com/webitel/im-thread-service/gen/go/api/v1;impb";

// The MessageHistory service provides methods for working with messages history.
service MessageHistory {
  // Search for messages in a thread.
  rpc SearchThreadMessagesHistory(SearchMessageHistoryRequest) returns (SearchMessageHistoryResponse);

  rpc SearchLeftThreadsMessageHistory(SearchLeftThreadsMessageHistoryRequest) returns (SearchMessageHistoryResponse);
}

message HistoryMessageCursorResponse {
  string id = 1;
}

message HistoryMessageCursorRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];

  bool before = 2;
}

message SearchMessageHistoryRequest {
  repeated string fields = 1;

  repeated string ids = 2;
  string thread_id = 3;
  repeated string sender_ids = 4;
  repeated int32 types = 5;
  int32 domain_id = 6;

  optional HistoryMessageCursorRequest cursor = 7;
  uint32 size = 8;
  string caller_id = 9;
}

message Document {
  string id = 1;
  string message_id = 2;
  int64 file_id = 3;
  string name = 4;
  string mime = 5;
  int64 size = 6;
  int64 created_at = 7;
  string url = 8;
}

message Image {
  string id = 1;
  string message_id = 2;
  int64 file_id = 3;
  string mime = 4;
  int32 width = 5;
  int32 height = 6;
  int64 created_at = 7;
  string url = 8;
}

message Location {
  string message_id = 1;
  double latitude = 2;
  double longitude = 3;
  optional string name = 4;
  optional string address = 5;
}

message Contact {
  optional string name = 1;
  optional string email = 2;
  optional string phone_number = 3;
  string message_id = 4;
}

message System {
  string type = 1;
  google.protobuf.Struct metadata = 2;
  string message_id = 3;
}

message ReplyToMessage {
  string id = 1;
  string sender_id = 2;
  int32 type = 3;
  string body = 4;
  int64 created_at = 5;
  optional string attachment_kind = 6;
  optional string attachment_name = 7;
  optional string attachment_mime = 8;
}

// MessageRecipientStatus is a per-recipient delivery state of a message.
message MessageRecipientStatus {
  // Recipient contact id (thread_dialog.member_id).
  string member_id = 1;

  MessageDeliveryStatus status = 2;

  // Unix time in milliseconds; zero when not reached.
  int64 delivered_at = 3;
  int64 read_at = 4;
  int64 failed_at = 5;

  // Confirmation source: ws|push|provider|bot.
  string via = 6;

  // JSON-encoded provider error details for FAILED.
  string error = 7;
}

message HistoryMessage {
  string id = 1;
  string thread_id = 2;
  string sender_id = 3;
  int32 type = 5;
  string body = 6;
  google.protobuf.Struct metadata = 7;

  int64 created_at = 8;
  int64 updated_at = 9;

  repeated Document documents = 10;
  repeated Image images = 11;
  Location location = 12;
  Contact contact = 13;
  System system = 14;
  Interactive interactive = 15;
  InteractiveCallback reacted_metadata = 16;

  ReplyToMessage reply_to = 17;

  // Aggregated delivery status across recipients: FAILED when every
  // recipient failed, otherwise the minimal status among non-failed ones.
  // UNSPECIFIED for messages without per-recipient tracking (historical).
  MessageDeliveryStatus delivery_status = 18;

  // Per-recipient delivery details.
  repeated MessageRecipientStatus statuses = 19;
}

message SearchMessageHistoryResponse {
  repeated HistoryMessage items = 1;
  repeated ThreadMember from = 2;

  HistoryMessageCursorResponse next_cursor = 3;
  HistoryMessageCursorResponse prev_cursor = 4;
}

// Retrieves message history grouped by the user's closed membership periods
// ("dialogs") within a thread. Active memberships are excluded — their
// messages are available via SearchThreadMessagesHistory.
message SearchLeftThreadsMessageHistoryRequest {
  string thread_id = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];

  int32 domain_id = 2;

  repeated string sender_ids = 4;
  repeated int32 types = 5;

  // Inclusive bounds on the dialog interval (epoch ms). Zero means unbounded.
  int64 period_from = 6;
  int64 period_to = 7;

  repeated string fields = 8;

  optional HistoryMessageCursorRequest cursor = 9;

  uint32 size = 10 [
    (buf.validate.field).uint32 = {lte: 100},
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
}

message InteractiveCallback {
  string reacted_by = 1;
  string in_reply_to = 2;
  string button_code = 3;
  string callback_data = 4;
  int64 reacted_at = 5;
}
