syntax = "proto3";

package webitel.im.service.thread.v1;

import "buf/validate/validate.proto";
import "service/thread/v1/message_history_service.proto";
import "service/thread/v1/thread_permission.proto";
import "service/thread/v1/shared.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/webitel/im-thread-service/gen/go/api/v1;impb";


// Thread service provides operations for managing
// and interacting with threads.
service ThreadManagement {

    // Searches threads using filtering, sorting,
    // and pagination parameters.
  rpc Search(ThreadSearchRequest) returns (SearchThreadResponse);

    // Returns a single thread by its identifier.
  rpc Get(GetThreadRequest) returns (Thread);

    // Creates a new group thread.
    // The creator becomes the owner of the thread.
  rpc CreateGroup(CreateGroupRequest) returns (Thread);

    // Adds a new member to an existing thread.
  rpc AddMember(AddMemberRequest) returns (AddMemberResponse);

  // Transfer unites add member and remove member.
  // It adds a new member to the thread and removes the initiator from the thread in one atomic operation.
  rpc Transfer(TransferRequest) returns (TransferResponse);

  // Removes a member from a thread.
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse);

  rpc SetVariables(SetVariablesRequest) returns (ThreadVariables);

  rpc SearchVariables(SearchVariablesRequest) returns (SearchVariablesResponse);

  rpc LocateVariables(LocateVariablesRequest) returns (ThreadVariables);

  rpc FlushVariables(FlushVariablesRequest) returns (ThreadVariables);
}

//#region Common

// ThreadKind defines the type of a thread.
// It determines the business rules and available features for the thread.
enum ThreadKind {
    // Unknown or unspecified thread type.
    // Must not be used in valid requests.
  UNKNOWN = 0;

    // One-to-one private thread between two users.
  DIRECT = 1;

    // Group thread with multiple members.
  GROUP = 2;

    // Channel-style thread (broadcast or topic based communication).
  CHANNEL = 3;
}

// Thread represents a thread (aka chat or conversation) entity.
message Thread {

    // Unique thread identifier.
  string id = 1;

    // Domain identifier the thread belongs to.
  int32 domain_id = 2;

    // Thread creation timestamp (Unix time, milliseconds).
  int64 created_at = 3;

    // Last update timestamp (Unix time, milliseconds).
  int64 updated_at = 4;

    // Type of the thread.
  ThreadKind kind = 5;

    // Thread subject or title.
  string subject = 9;

    // Optional thread description.
  string description = 10;

    // Detailed member information.
  repeated ThreadMember members = 11;

  // Last message of the linked thread.
  webitel.im.service.thread.v1.HistoryMessage last_msg = 12;

  // Optional variables associated with the thread.
  ThreadVariables variables = 13;
}

//#endregion

// ThreadSearchRequest defines requested fields, filters, sorting and pagination
// options for searching thread.
message ThreadSearchRequest {

    // List of fields that should be returned in the response.
    // If empty, a default set of fields is returned.
    // Used for response optimization.
  repeated string fields = 1;

    // Filter by specific thread IDs.
  repeated string ids = 2 [
    (buf.validate.field).repeated.items.string.uuid = true
  ];

    // Filter threads by domain IDs.
  repeated int32 domain_ids = 3 [
    (buf.validate.field).repeated.items.int32.gt = 0
  ];

    // Filter threads by their kinds.
    // UNKNOWN (0) is not allowed.
  repeated ThreadKind kinds = 4 [
    (buf.validate.field).repeated.items.enum.defined_only = true,
    (buf.validate.field).repeated.items.enum.not_in = 0
  ];

    // Filter threads by owner user IDs.
  repeated string owners = 5 [
    (buf.validate.field).repeated.items.string.uuid = true
  ];

    // Full-text search query.
    // Typically applied to subject.
  string q = 6[
    (buf.validate.field).string = {min_len: 0, max_len: 256}
  ];

    // Filter threads where specified users are members.
  repeated string member_ids = 7 [
    (buf.validate.field).repeated.items.string.uuid = true
  ];

    // Maximum number of threads to return per page.
    // Must be greater than 0 and less than or equal to 100.
  int32 size = 8 [
    (buf.validate.field).int32 = {gt: 0, lte: 100},
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];

    // Sorting field.
    // Optional "+" or "-" prefix indicates ascending or descending order.
    // Example: "-created_at", "subject"
  string sort = 9 [
    (buf.validate.field).string.pattern = "^[+-]?[a-z_]+$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];

    // Page number (1-based).
  int32 page = 10 [
    (buf.validate.field).int32.gte = 1,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
}

// GetThreadRequest defines parameters for retrieving a single thread.
message GetThreadRequest {

    // Unique thread identifier.
  string id = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];

    // Domain identifier to filter by.
  int32 domain_id = 2 [
    (buf.validate.field).int32.gt = 0,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];

    // List of fields to include in the response.
  repeated string fields = 3;
}

// SearchThreadResponse contains the list of threads
// and pagination metadata.
message SearchThreadResponse {

    // List of threads matching the search criteria.
  repeated Thread items = 1;

    // Indicates whether there is a next page available.
  bool next = 2;
}


// ThreadDirectSettings defines settings
// specific to direct (one-to-one) threads.
message ThreadSettings {

    // Settings identifier.
  string id = 1;

    // Domain identifier.
  int32 domain_id = 2;

    // Creation timestamp (Unix time, milliseconds).
  int64 created_at = 3;

    // Last update timestamp (Unix time, milliseconds).
  int64 updated_at = 4;

    // Custom title for the direct thread.
    // Usually represents the display name of the conversation.
  string title = 5;
}

message AddMemberRequest {
  string thread_id = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];

  optional string initiator_contact_id = 2;

  string new_member_contact_id= 3 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true

  ];

  ThreadRole role = 4 [
    (buf.validate.field).enum.defined_only = true,
    (buf.validate.field).required = true
  ];
}

message AddMemberResponse {
  ThreadMember member = 1;
}

message RemoveMemberRequest {
  optional string initiator_contact_id = 1;

  string target_member_id = 2 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true

  ];
  optional string reason = 3;
}

message RemoveMemberResponse {
}

message TransferRequest{
  string thread_id = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];

  string initiator_contact_id = 2 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];

  string new_member_contact_id= 3 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true

  ];

  ThreadRole role = 4 [
    (buf.validate.field).enum.defined_only = true,
    (buf.validate.field).required = true
  ];
}

message TransferResponse {
  ThreadMember member = 1;
}

// #region Thread Variables

message VariableEntry {
  google.protobuf.Struct value  = 1;
  string                 set_by = 2;
  int64                  set_at = 3;
}

message VariableEntryRequest {
  string                 key   = 1;
  google.protobuf.Struct value = 2;
}

message ThreadVariables {
  string                     thread_id = 1;
  map<string, VariableEntry> variables = 2;
}

message SetVariablesRequest {
  string thread_id = 1 [
    (buf.validate.field).string.uuid = true
  ];
  repeated VariableEntryRequest variables = 2;
  string member_id = 3 [
    (buf.validate.field).string.uuid = true
  ];

}

message SearchVariablesResponse {
  repeated ThreadVariables items = 1;
  bool                     next  = 2;
}

message SearchVariablesRequest {
  int32           size       = 1;
  int32           page       = 2;
  repeated string fields     = 3;
  repeated string thread_ids = 4;
}

message LocateVariablesRequest {
  string thread_id = 1 [
    (buf.validate.field).string.uuid = true
  ];
}

message FlushVariablesRequest {
  string thread_id = 1 [
    (buf.validate.field).string.uuid = true
  ];

  string member_id = 2 [
    (buf.validate.field).string.uuid = true
  ];

  repeated string keys = 3;
}

// #endregion
