syntax = "proto3";

package webitel.im.service.auth.v1;

import "service/auth/v1/authorization.proto";

option go_package = "github.com/webitel/im-account-service/proto/gen/im/service/auth/v1;authpb";

// Update about Authorization client register device for PUSH notifications.
// exchange: im_system.events ; topic: updates.device.register
message UpdateDeviceRegister {
  // Authorization (Session) changes.
  // [Update.Authorization.Device.Push.Token] add registration.
  Authorization authorization = 1;
}

// Update about Authorization client deregister device for PUSH notifications.
// exchange: im_system.events ; topic: updates.device.unregister
message UpdateDeviceUnregister {
  // Authorization (Session) changes.
  // [Update.Authorization.Device.Push.Token] registration canceled.
  Authorization authorization = 1;
}

// Update on Authorization session logged out by end-User (Contact).
// exchange: im_system.events ; topic: updates.device.logout
message UpdateDeviceLogout {
  // Authorization (Session) that was canceled.
  Authorization authorization = 1;
}