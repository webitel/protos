syntax = "proto3";

package webitel.im.service.contact.v1;

import "buf/validate/validate.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/webitel/im-contact-service/gen/go/api/v1;impb";

message CreateViaRequest {
    string contact_id =1;
    string via = 2;
    bool disable =3;
    optional string disable_reason = 4;
    google.protobuf.Struct metadata = 5;
}

message Via {
    string contact_id = 1;
    string via = 2;
    bool disable = 3;
    optional string disable_reason = 4;
    int64 created_at = 5;
    int64 updated_at = 6;
    google.protobuf.Struct metadata = 7;
}

message UpdateViaRequest {
    string contact_id =1;
    string via = 2;
    bool disable =3;
    optional string disable_reason = 4;
    google.protobuf.Struct metadata = 5;
}

message PartialUpdateViaRequest {
    UpdateViaRequest update = 1;
    google.protobuf.FieldMask field_mask = 2 [(buf.validate.field).required = true];
}

message SearchViaRequest {
    string sort = 1;
    uint32 size = 2;
    uint32 page = 3;
    repeated string fields = 4;
    repeated string contact_ids = 5;
    optional bool disabled = 6;
    repeated string vias = 7;
}

message SearchViaResponse {
    repeated Via items = 1;
    bool next = 2;
    int32 page = 3;
}
