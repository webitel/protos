syntax = "proto3";

package webitel.im.service.contact.v1;

import "buf/validate/validate.proto";

service ContactPrivacy {
  rpc CanSend(CanSendRequest) returns( CanSendResponse) {}
  rpc CanInvite(CanInviteRequest) returns (CanInviteResponse) {}
}

message CanSendRequest {
  string from = 1 [(buf.validate.field).string.uuid = true];
  string to   = 2 [(buf.validate.field).string.uuid = true];
}

message CanSendResponse {
}

message CanInviteRequest {
  string from = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true];
  string to = 2[
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];
}

message CanInviteResponse {}