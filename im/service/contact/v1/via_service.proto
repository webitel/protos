syntax = "proto3";

package webitel.im.service.contact.v1;

import "service/contact/v1/via.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/webitel/im-contact-service/gen/go/api/v1;impb";

service Vias {
    rpc Create(webitel.im.service.contact.v1.CreateViaRequest)returns(webitel.im.service.contact.v1.Via);
    rpc Update(webitel.im.service.contact.v1.UpdateViaRequest)returns(webitel.im.service.contact.v1.Via);
    rpc PartialUpdate(webitel.im.service.contact.v1.PartialUpdateViaRequest)returns(webitel.im.service.contact.v1.Via);
    rpc Search(webitel.im.service.contact.v1.SearchViaRequest)returns(webitel.im.service.contact.v1.SearchViaResponse);
}
