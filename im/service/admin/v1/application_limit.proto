// LimitZone options to define a shared Zone
// used to store state of [key] record limit.
message LimitZone {

  // [D]ata [S]ource [N]ame i.e. connection string URL.
  // Defines backend storage driver & connection options.
  //
  // DSN     ::=  scheme ":" opaque
  // scheme  ::=  "local" / "redis" / "rediss"
  // opaque  ;;    scheme specific driver options
  //
  // List of supported scheme[:options]
  // - "local"     ; DEFAULT
  // - "redis[s]://user:pass@127.0.0.1:6379/0?[param=value]"
  string dsn = 1;

  // Key characteristic against which the limit is applied.
  //
  // List of implemented keys for use:
  // - client.ip      ; remote client IP address [ proxied | remote ]
  // - client.id      ; client app.id used to access [IM] services  ; [x-webitel-client]
  // - device.id      ; client [device] self identification  ; [x-webitel-device]
  // - account.id     ; signed-in account (i.e: Contact) service IDentifier
  // - account.iss    ; signed-in account (i.e: Contact) profile / identity Issuer
  // - account.sub    ; signed-in account (i.e: Contact) subject / subscriber ID at the Issuer
  // - account.proto  ; signed-in account (i.e: Contact) service [proto]type ; default: [.iss]
  // - business.id    ; business [d]omain [c]omponent IDentifier i.e. DC
  string key = 2;

  // Zone unique reference code name
  string name = 3;

  // Maximum memory usage size.
  //
  // SIZE  ::=  *( "0"-"9" ) UNIT
  // UNIT  ::=  "b" / "Kb" / "Mb" / "Gb"
  //
  // List of size UNITs supported:
  // - "b"    ; byte
  // - "Kb"   ; Kilobyte ( 1024b )
  // - "Mb"   ; Megabyte ( 1024Kb )
  // - "Gb"   ; Gigabyte ( 1024Mb )
  string size = 4;

  // Limit [rate] for this zone, e.g.: "10r/s"
  //
  // RATE  ::=   *( "0"-"9" ) "r/" UNIT
  // UNIT  ::=   "s" / "m" / "h" / "d" / "w"
  //
  // List of time UNITs implemented:
  // - "s" / "sec"     ; second
  // - "m" / "min"     ; minute
  // - "h" / "hour"    ; an hour
  // - "d" / "day"     ; 24 hours
  // - "w" / "week"    ; 7 days
  string rate = 5;

  // Algorithm used to limit [rate] for each unique [key].(value) of this zone.
  //
  // List of [not]implemented algorithms:
  // - "token_bucket"    ; +[yes]
  // - "leaky_bucket"    ; -[not]
  // - "fixed_window"    ; +[yes]
  // - "sliding_window"  ; -[not]
  string algo = 6;

  // Burst is the maximum number of tokens a bucket (-like algorithms) can hold,
  // allowing a temporary, rapid spike in traffic to exceed the average rate limit instantly
  google.protobuf.UInt32Value burst = 7;

  // google.protobuf.UInt32Value delay = 8;
}

// LimitRoute defines an HTTP request matching rule to apply limits check
message LimitRoute {
  // Custom route name for debugging
  string name = 1;
  // HTTP path template to intercept API calls
  string path = 2;
  // HTTP method i.e. VERB
  repeated string verb = 3;
  // Routing zone(s) to restrict [key] usage
  repeated LimitRequest route = 4;
}

// LimitRequest defines options for requesting a zone limit
message LimitRequest {

  // Code name of the usage limit zone.
  string zone = 1;

  // Salt to mix the primary zone.key with an optional secondary keys
	// for more specific route/zone relationship that needs to be limited
	//
	// For best practices, specify keys from most to least unique:
	// - ["http.verb", "http.path"]  ; bad performance
	// - ["http.path", "http.verb"]  ; good performance
  repeated string salt = 2;

  // Associate key with the route that this request is defined within ?
  // In other words, make the key associated with the route.
  // Associate limit zone key with a matched route ?
  // FIXME: what about /im/threads/{thread_id}/messages
  // bool // sub ; rel ; related ; key_path ; rel_path

  // deprecated. options below moved to Zone options

  // uint32 burst = 1;
  // uint32 delay = 2;
  // google.protobuf.UInt32Value burst = 1;
  // google.protobuf.UInt32Value delay = 2;
}

