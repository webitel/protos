syntax = "proto3";

package webitel.im.service.admin.v1;

import "google/protobuf/wrappers.proto";

option go_package = "github.com/webitel/im-account-service/proto/gen/im/service/admin/v1;adminpb";

// LimitService defines configuration for API limits
message LimitService {
  // Zone defines the shared memory section(s) registry.
	// Used to store the state of each determined key limit.
	// Used to [limit] HTTP requests in [route] section below.
  repeated LimitZone zone = 1;
  // OPTIONAL. Route defines a set of HTTP request matching rules and corresponding restriction zones.
  repeated LimitRoute route = 2;
  // OPTIONAL. Default route for ANY request that has no respective [route] match.
  repeated LimitRequest default = 3;
}


// Limit Algorithms.
enum LimitAlgo {
  TOKEN_BUCKET = 0;
  LEAKY_BUCKET = 1; // not implemented
  FIXED_WINDOW = 2;
  SLIDING_WINDOW = 3; // not implemented
}

