syntax = "proto3";

package webitel.im.api.gateway.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";

option go_package = "github.com/webitel/im-contact-service/gen/go/api/v1;impb";

// ContactSettingsManagement service provides access to contact settings.
service ContactSettingsManagement {
  // Get retrieves the contact settings for the request initiator.
  rpc Get(GetContactSettingsRequest) returns (GetContactSettingsResponse) {
    option (google.api.http) = {
      get: "/v1/contacts/self/settings"
    };
  };
  // Update modifies the contact settings for the request initiator. Only the fields provided in the request will be updated; other existing settings will remain unchanged.
  rpc Update(UpdateContactSettingsRequest) returns (UpdateContactSettingsResponse) {
    option (google.api.http) = {
      patch: "/v1/contacts/self/settings"
    };
  };
}

message GetContactSettingsRequest {
  string contact_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];
}

message GetContactSettingsResponse {
  ContactSettings settings = 1;
}

message UpdateContactSettingsRequest {
  string contact_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  optional UserFilter allow_invites_from = 2;
}

message UpdateContactSettingsResponse {
  ContactSettings settings = 1;
}

message ContactSettings {
  string     contact_id         = 1;
  int64      updated_at         = 2;
  UserFilter allow_invites_from = 3;
}

enum UserFilter {
  ALL         = 0;
  NOBODY      = 1;
  SAME_ISSUER = 2;
}
