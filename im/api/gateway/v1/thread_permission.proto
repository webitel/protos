syntax = "proto3";

package webitel.im.api.gateway.v1;

import "google/api/annotations.proto";
import "buf/validate/validate.proto";

// ThreadPermissionService defines the gRPC service for managing thread permissions.
service ThreadPermission {
    // Get returns all permissions for the specified thread. Optional filter by member_id to get permissions for a specific member.
  rpc Get(GetThreadPermissionsRequest) returns (GetThreadPermissionsResponse);
  // Update updates permissions for a specific member in the thread. The request must include the thread_id and member_id, along with the permissions to update.
  rpc Update(UpdateThreadPermissionsRequest) returns (ThreadPermissions);
}

message GetThreadPermissionsRequest {
  int64  page      = 1;
  int64  size      = 2;
  string thread_id = 3[
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];
  optional string member_id = 4;
}

message GetThreadPermissionsResponse {
  repeated ThreadPermissions permissions = 1;

}

message ThreadPermissions {
  string id               = 1;
  string thread_dialog_id = 2;
  string thread_id        = 3;
  string member_id        = 4;
  int64  created_at       = 5;
  int64  updated_at       = 6;

  bool can_send_messages              = 7;
  bool can_add_members                = 8;
  bool can_remove_members             = 9;
  bool can_change_members_permissions = 10;
  bool can_change_thread_info         = 11;
}

message UpdateThreadPermissionsRequest {
  string          thread_id            = 1[
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];
  string member_id = 2[
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];

  optional bool can_send_messages              = 4;
  optional bool can_add_members                = 5;
  optional bool can_remove_members             = 6;
  optional bool can_change_members_permissions = 7;
  optional bool can_update_thread_info         = 8;
}