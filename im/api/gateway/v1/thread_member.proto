syntax = "proto3";

package webitel.im.api.gateway.v1;

import "api/gateway/v1/contact.proto";
import "api/gateway/v1/thread_permission.proto";

enum ThreadRole {
  ROLE_UNSPECIFIED = 0;
  ROLE_MEMBER      = 1;
  ROLE_ADMIN       = 2;
  ROLE_OWNER       = 3;
  ROLE_SUPERVISOR  = 4;
}

// ThreadMember represents a thread participant
// with optional type-specific settings.
message ThreadMember {

  string id = 1;

  Contact contact = 2;

  ThreadRole role = 3;

  ThreadPermissions permissions = 4;
}
