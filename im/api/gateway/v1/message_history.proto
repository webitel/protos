syntax = "proto3";
package webitel.im.api.gateway.v1;

import "google/protobuf/any.proto";
import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "api/gateway/v1/thread_member.proto";
import "api/gateway/v1/message.proto";

option go_package = "github.com/webitel/im-gateway-service/gen/api/gateway/v1;gateway";

// MessageHistory service provides read-only access
// to message history within threads.
service MessageHistory {

  // Searches messages within a specific thread.
  // Supports cursor-based pagination and field selection.
  rpc SearchThreadMessagesHistory(SearchMessageHistoryRequest) returns (SearchMessageHistoryResponse) {
    option (google.api.http) = {
      get: "/v1/{thread_id}/messages"
    };
  }

  // Searches messages grouped by the user's closed membership periods
  // within a thread. Active memberships are excluded — their
  // messages are available via SearchThreadMessagesHistory.
  rpc SearchLeftThreadsMessagesHistory(SearchLeftThreadsMessageHistoryRequest) returns (SearchMessageHistoryResponse) {
    option (google.api.http) = {
      get: "/v1/{thread_id}/left_threads/messages"
    };
  }
}

// HistoryMessageCursorResponse defines next/prev id for keyset-pagination.
message HistoryMessageCursorResponse {

  // Unique identifier last message where cursor stopped.
  string id = 1;
}

// HistoryMessageCursorRequest represents a cursor-based pagination request
// for retrieving messages relative to a specific message ID.
//
// This request is used in keyset pagination, where the `id` field acts as a
// cursor pointing to a reference message in the history. The server returns
// messages either before or after this cursor depending on the `before` flag.
//
// Pagination semantics:
//   - The `id` must be a valid UUID of an existing message.
//   - The result set is always ordered consistently (e.g., by creation time).
//   - The `before` flag controls the direction of traversal in the message history.
//
// Direction behavior:
//   - before = true:
//       Fetch messages that come *before* the given message in history
//       (i.e., older messages).
//
//   - before = false:
//       Fetch messages that come *after* the given message
//       (i.e., newer messages, moving toward the present).
//
// Notes:
//   - This approach avoids offset-based pagination issues such as skipping
//     or duplicating records when data changes.
//   - Typically used for chat/message history scrolling.
//   - The number of returned messages is controlled separately (e.g., via limit).
//
message HistoryMessageCursorRequest {
  // Cursor identifier.
  // Must be a valid UUID referencing an existing message.
  // Defines the starting point for pagination.
  string id = 1 [
    (buf.validate.field).string.uuid = true
  ];

  // Pagination direction flag.
  //
  // true  -> fetch newer messages (back before history)
  // false -> fetch older messages (back to older history)
  bool before = 2;
}

// SearchMessageHistoryRequest defines filtering,
// pagination and projection options for searching
// message history.
message SearchMessageHistoryRequest {

  // List of message fields to be returned.
  // Used to reduce payload size.
  repeated string fields = 1;

  // Filter by specific message IDs.
  repeated string ids = 2 [
    (buf.validate.field).repeated.items.string.uuid = true,
    (buf.validate.field).repeated.max_items = 100
  ];

  // Filter by thread IDs.
  string thread_id= 3 [
    (buf.validate.field).string.uuid = true
  ];

  // Filter messages by sender user IDs.
  repeated string sender_ids = 4 [
    (buf.validate.field).repeated.items.string.uuid = true,
    (buf.validate.field).repeated.max_items = 50
  ];

  // Filter messages by message types.
  repeated int32 types = 5 [
    (buf.validate.field).repeated.items.int32.gte = 1,
    (buf.validate.field).repeated.items.int32.lte = 4,
    (buf.validate.field).repeated.max_items = 4
  ];

  // Cursor for cursor-based pagination.
  // If omitted, search starts from the most recent messages.
  optional HistoryMessageCursorRequest cursor = 6;

  // Maximum number of messages to return.
  uint32                        size   = 7 [
    (buf.validate.field).uint32 = {
    gte: 1,
    lte: 100
    },
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
}

// Document represents a file attachment
// associated with a message.
message Document {

  // Document identifier.
  string id = 1;

  // Identifier of the message this document belongs to.
  string message_id = 2;

  // File storage identifier.
  int64 file_id = 3;

  // Original file name.
  string name = 4;

  // MIME type of the document.
  string mime = 5;

  // File size in bytes.
  int64 size = 6;

  // Creation timestamp (Unix time, milliseconds).
  int64 created_at = 7;

  // Public signed URL for downloading the document.
  string url = 8;
}

// Image represents an image attachment
// associated with a message.
message Image {

  // Image identifier.
  string id = 1;

  // Identifier of the message this message belongs to.
  string message_id = 2;

  // File storage identifier.
  int64 file_id = 3;

  // MIME type of the image.
  string mime = 4;

  // Image width in pixels.
  int32 width = 5;

  // Image height in pixels.
  int32 height = 6;

  // Creation timestamp (Unix time, milliseconds).
  int64 created_at = 7;

  // Public signed URL for accessing the image.
  string url = 8;
}

// HistoryMessage represents a single message
// in thread history.
message HistoryMessage {

  // Unique message identifier.
  string id = 1;

  // Identifier of the thread the message belongs to.
  string thread_id = 2;

  // Sender user aggregated information.
  ThreadMember sender = 3;

  // Message type identifier.
  int32 type = 4;

  // Message body content.
  string body = 5;

  // Arbitrary message metadata.
  // Can contain structured data depending on message type.
  google.protobuf.Struct metadata = 6;

  // Message creation timestamp (Unix time, milliseconds).
  int64 created_at = 7;

  // Message last update timestamp (Unix time, milliseconds).
  int64 edited_at = 8;

  // List of document attachments.
  repeated Document documents = 9;

  // List of image attachments.
  repeated Image images = 10;

  MessageContact contact = 11;
  MessageLocation location = 12;
  Interactive interactive =13;
}

// SearchMessageHistoryResponse contains
// message history search results and pagination metadata.
message SearchMessageHistoryResponse {

  // List of messages matching the search criteria.
  repeated HistoryMessage items = 1;

  // Cursor that represents position to get older messages (used without 'before' param).
  HistoryMessageCursorResponse next_cursor = 2;

  // Cursor that represents position to get newest messages (used with 'before' param).
  HistoryMessageCursorResponse prev_cursor = 3;
}

// SearchLeftThreadsMessageHistoryRequest defines filtering,
// pagination and projection options for searching message
// history grouped by the user's closed membership periods
// ("dialogs") within a thread.
message SearchLeftThreadsMessageHistoryRequest {

  // List of message fields to be returned.
  // Used to reduce payload size.
  repeated string fields = 1;

  // Filter by thread ID.
  string thread_id = 2 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];

  // Filter messages by sender user IDs.
  repeated string sender_ids = 3 [
    (buf.validate.field).repeated.items.string.uuid = true,
    (buf.validate.field).repeated.max_items = 50
  ];

  // Filter messages by message types.
  repeated int32 types = 4 [
    (buf.validate.field).repeated.items.int32.gte = 1,
    (buf.validate.field).repeated.items.int32.lte = 4,
    (buf.validate.field).repeated.max_items = 4
  ];

  // Inclusive lower bound on the dialog interval (Unix time, milliseconds).
  // Zero means unbounded.
  int64 period_from = 5;

  // Inclusive upper bound on the dialog interval (Unix time, milliseconds).
  // Zero means unbounded.
  int64 period_to = 6;

  // Cursor for cursor-based pagination.
  // If omitted, search starts from the most recent dialog.
  optional HistoryMessageCursorRequest cursor = 7;

  // Maximum number of messages to return.
  uint32 size = 8 [
    (buf.validate.field).uint32 = {
      gte: 1,
      lte: 100
    },
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
}

// SearchDialogsMessageHistoryResponse contains
// dialog-grouped message history search results
// and pagination metadata.
message SearchDialogsMessageHistoryResponse {

  // Dialogs (closed membership periods) matching the search criteria,
  // each containing its messages.
  repeated SessionMessageHistory items = 1;

  // Cursor that represents position to get older dialogs (used without 'before' param).
  HistoryMessageCursorResponse next_cursor = 2;

  // Cursor that represents position to get newest dialogs (used with 'before' param).
  HistoryMessageCursorResponse prev_cursor = 3;
}

// SessionMessageHistory represents a single closed membership
// period ("dialog") of a user within a thread, together with
// the messages exchanged during that period.
message SessionMessageHistory {

  // Membership identifier of the closed dialog.
  string member_id = 1;

  // Identifier of the user who invited the member into the thread.
  string invited_by = 2;

  // Role the member held within the thread during this dialog.
  ThreadRole thread_role = 3;

  // Reason the member left the thread (closing the dialog).
  string leave_reason = 4;

  // Messages exchanged during this dialog, ordered consistently
  // with the surrounding pagination.
  repeated HistoryMessage messages = 5;
}

message MessageContact {
    optional string name =1;
    optional string email = 2;
    optional string phone = 3;
}

message MessageLocation {
    double longitude = 1;
   double latitude = 2;
  optional string address = 3;
 optional string name =4;
}
