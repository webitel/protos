syntax = "proto3";

package webitel.im.api.provider.v1;

import "google/api/annotations.proto";
import "api/provider/v1/messages.proto";

option go_package = "github.com/webitel/im-provider-service/gen/api/provider/v1;provider";

// GateService provides a unified interface for listing all registered messaging gateways.
service GateService {
  rpc ListGates(ProviderListGatesRequest) returns (ProviderListGatesResponse) {
    option (google.api.http) = { get: "/im/gates" };
  }
}
