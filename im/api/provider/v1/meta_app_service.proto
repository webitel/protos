syntax = "proto3";

package webitel.im.api.provider.v1;

import "google/api/annotations.proto";
import "api/provider/v1/messages.proto";

option go_package = "github.com/webitel/im-provider-service/gen/api/provider/v1;provider";

// MetaAppService manages Meta Developer Application configurations.
service MetaAppService {
  rpc CreateMetaApp(ProviderCreateMetaAppRequest) returns (ProviderCreateMetaAppResponse) {
    option (google.api.http) = { post: "/im/meta-apps", body: "*" };
  }

  rpc GetMetaApp(ProviderGetMetaAppRequest) returns (ProviderGetMetaAppResponse) {
    option (google.api.http) = { get: "/im/meta-apps/{id}" };
  }

  rpc UpdateMetaApp(ProviderUpdateMetaAppRequest) returns (ProviderUpdateMetaAppResponse) {
    option (google.api.http) = { patch: "/im/meta-apps/{id}", body: "*" };
  }

  rpc DeleteMetaApp(ProviderDeleteMetaAppRequest) returns (ProviderDeleteMetaAppResponse) {
    option (google.api.http) = { delete: "/im/meta-apps/{id}" };
  }
}
