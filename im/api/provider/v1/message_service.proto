syntax = "proto3";

package webitel.im.api.provider.v1;

import "google/api/annotations.proto";
import "api/provider/v1/enums.proto";

option go_package = "github.com/webitel/im-provider-service/gen/api/provider/v1;provider";

// ProviderMessageService delivers outbound messages to external chat partners.
service ProviderMessageService {
  rpc SendText(ProviderSendTextRequest) returns (ProviderSendMessageResponse) {
    option (google.api.http) = { post: "/im/provider/send/text", body: "*" };
  }

  rpc SendDocument(ProviderSendDocumentRequest) returns (ProviderSendMessageResponse) {
    option (google.api.http) = { post: "/im/provider/send/document", body: "*" };
  }

  rpc SendImage(ProviderSendImageRequest) returns (ProviderSendMessageResponse) {
    option (google.api.http) = { post: "/im/provider/send/image", body: "*" };
  }

  // SendInteractive delivers a message with interactive UI elements (buttons, menus).
  rpc SendInteractive(ProviderSendInteractiveRequest) returns (ProviderSendMessageResponse) {
    option (google.api.http) = { post: "/im/provider/send/interactive", body: "*" };
  }
}

message ProviderSendMessageResponse {
  string external_id = 1;
  int64 created_at = 2;
}

message ProviderFile {
  string id = 1;
  string url = 2;
  string name = 3;
  string mime_type = 4;
  int64 size = 5;
}

message ProviderSendTextRequest {
  webitel.im.api.provider.v1.ProviderType type = 1;
  string gate_id = 2;
  string external_user_id = 3;
  string text = 4;
  map<string, string> metadata = 10;
}

message ProviderSendDocumentRequest {
  webitel.im.api.provider.v1.ProviderType type = 1;
  string gate_id = 2;
  string external_user_id = 3;
  repeated ProviderFile documents = 4;
  string caption = 5;
}

message ProviderSendImageRequest {
  webitel.im.api.provider.v1.ProviderType type = 1;
  string gate_id = 2;
  string external_user_id = 3;
  repeated ProviderFile images = 4;
  string caption = 5;
}

message ProviderSendInteractiveRequest {
  string gate_id = 1;
  string external_user_id = 2;
  int32 domain_id = 3;
  optional string body = 4;
  optional string send_id = 5;
  ProviderInteractive interactive = 6;
}

message ProviderInteractive {
  bool single_use = 1;
  oneof kind {
    ProviderKeyboardMarkup markup = 2;
    ProviderKeyboardListReply list_reply = 3;
  }
}

message ProviderKeyboardMarkup {
  repeated ProviderKeyboardRow rows = 1;
}

message ProviderKeyboardListReply {
  string main_button_title = 1;
  repeated ProviderKeyboardRowWithSection sections = 2;
}

message ProviderKeyboardRow {
  repeated ProviderKeyboardButton buttons = 1;
}

message ProviderKeyboardRowWithSection {
  string section = 1;
  repeated ProviderKeyboardButton buttons = 2;
}

message ProviderKeyboardButton {
  string id = 1;
  string label = 2;
  oneof kind {
    ProviderKeyboardButtonURL url = 3;
    ProviderKeyboardButtonCallback callback = 4;
    ProviderKeyboardButtonRequest request = 5;
  }
}

message ProviderKeyboardButtonURL {
  string url = 1;
}

message ProviderKeyboardButtonCallback {
  string data = 1;
}

message ProviderKeyboardButtonRequest {
  string action = 1;
}
