syntax = "proto3";

package webitel.im.api.provider.v1;

import "google/api/annotations.proto";
import "api/provider/v1/messages.proto";

option go_package = "github.com/webitel/im-provider-service/gen/api/provider/v1;provider";

// WhatsAppService defines RPC methods for managing WhatsApp Business Account gateways.
service WhatsAppService {
  rpc CreateWhatsAppGate(ProviderCreateWhatsAppGateRequest) returns (ProviderCreateWhatsAppGateResponse) {
    option (google.api.http) = { post: "/im/gates/whatsapp", body: "*" };
  }

  rpc GetWhatsAppGate(ProviderGetWhatsAppGateRequest) returns (ProviderGetWhatsAppGateResponse) {
    option (google.api.http) = { get: "/im/gates/whatsapp/{id}" };
  }

  rpc UpdateWhatsAppGate(ProviderUpdateWhatsAppGateRequest) returns (ProviderUpdateWhatsAppGateResponse) {
    option (google.api.http) = { patch: "/im/gates/whatsapp/{id}", body: "*" };
  }

  rpc DeleteWhatsAppGate(ProviderDeleteWhatsAppGateRequest) returns (ProviderDeleteWhatsAppGateResponse) {
    option (google.api.http) = { delete: "/im/gates/whatsapp/{id}" };
  }
}
