syntax = "proto3";

package webitel.kb;

option go_package = "github.com/webitel/webitel-kb/api/kb;kb";

import "common.proto";
import "general.proto";
import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "proto/webitel/option.proto";

// Articles manages knowledge-base articles: CRUD, hierarchy (depth 1..5) and
// navigation (move, children, ancestors, tree). Mutations use the etag for
// optimistic locking.
service Articles {
  option (option.objclass) = "kb_articles";

  // ListArticles lists articles within a space with optional filters.
  rpc ListArticles(ListArticlesRequest) returns (ArticleList) {
    option (google.api.http) = {
      get: "/v1/kb/articles"
    };
    option (option.access) = ACTION_READ;
  }

  // LocateArticle returns a single article by etag.
  rpc LocateArticle(LocateArticleRequest) returns (Article) {
    option (google.api.http) = {
      get: "/v1/kb/articles/{etag}"
    };
    option (option.access) = ACTION_READ;
  }

  // CreateArticle creates an article and its first version.
  rpc CreateArticle(CreateArticleRequest) returns (Article) {
    option (google.api.http) = {
      post: "/v1/kb/articles",
      body: "input"
    };
    option (option.access) = ACTION_UPDATE;
  }

  // UpdateArticle updates an article, creating a new version (optimistic lock via etag).
  rpc UpdateArticle(UpdateArticleRequest) returns (Article) {
    option (google.api.http) = {
      put: "/v1/kb/articles/{etag}",
      body: "input"
      additional_bindings {
        patch: "/v1/kb/articles/{etag}",
        body: "input"
      }
    };
    option (option.access) = ACTION_UPDATE;
  }

  // DeleteArticle soft-deletes an article.
  rpc DeleteArticle(DeleteArticleRequest) returns (Article) {
    option (google.api.http) = {
      delete: "/v1/kb/articles/{etag}"
    };
    option (option.access) = ACTION_UPDATE;
  }

  // MoveArticle reparents an article, validating cycles and max depth.
  rpc MoveArticle(MoveArticleRequest) returns (Article) {
    option (google.api.http) = {
      post: "/v1/kb/articles/{etag}/move",
      body: "*"
    };
    option (option.access) = ACTION_UPDATE;
  }

  // ListChildren returns the direct children of an article.
  rpc ListChildren(ListChildrenRequest) returns (ArticleList) {
    option (google.api.http) = {
      get: "/v1/kb/articles/{id}/children"
    };
    option (option.access) = ACTION_READ;
  }

  // ListAncestors returns the ancestor chain (root first), serving breadcrumbs.
  rpc ListAncestors(ListAncestorsRequest) returns (ArticleList) {
    option (google.api.http) = {
      get: "/v1/kb/articles/{id}/ancestors"
    };
    option (option.access) = ACTION_READ;
  }

  // GetTree returns the article hierarchy of a space, RBAC filtered.
  rpc GetTree(GetTreeRequest) returns (GetTreeResponse) {
    option (google.api.http) = {
      get: "/v1/kb/spaces/{space_id}/tree"
    };
    option (option.access) = ACTION_READ;
  }
}

// Article is the article read model.
message Article {
  // Unique identifier of the article.
  int64 id = 1;
  // Owning domain id.
  int64 domain_id = 2;
  // Space the article belongs to.
  general.Lookup space = 3;
  // Parent article id; 0 for a top-level article.
  int64 parent_id = 4;
  // Hierarchy depth (1..5).
  int32 depth = 5;
  // Article type.
  ArticleType type = 6;
  // Current subject (mirrors the published version).
  string subject = 7;
  // Article tags.
  repeated string tags = 8;
  // Lifecycle state.
  ArticleState state = 9;
  // Indexing state.
  IndexState index_state = 10;
  // Published version id; 0 if not yet published.
  int64 published_version_id = 11;
  // Optimistic-lock counter.
  int32 ver = 12;
  // CreatedAt timestamp (epoch ms).
  int64 created_at = 20;
  // UpdatedAt timestamp (epoch ms).
  int64 updated_at = 21;
  // User who created the article.
  general.Lookup created_by = 22;
  // User who last updated the article.
  general.Lookup updated_by = 23;
  // Concurrency token encoding id and ver.
  string etag = 30;
}

// InputArticle carries the writable fields of an article and its body.
message InputArticle {
  // Target space.
  int64 space_id = 1;
  // Parent article id; 0 for a top-level article.
  int64 parent_id = 2;
  // Article type.
  ArticleType type = 3;
  // Article subject.
  string subject = 4;
  // Article tags.
  repeated string tags = 5;
  // Lifecycle state.
  ArticleState state = 6;
  // Editor document; serialized server-side to markdown/plaintext/tsvector.
  google.protobuf.Struct body_rich_text = 7;
}

// ListArticlesRequest parameters and filters.
message ListArticlesRequest {
  // Page size.
  int32 size = 1;
  // Page number (1-based).
  int32 page = 2;
  // Optional subject search.
  string q = 3;
  // Space to list within.
  int64 space_id = 4;
  // Optional tag filter.
  repeated string tags = 5;
  // Optional state filter.
  ArticleState state = 6;
  // Optional type filter.
  ArticleType type = 7;
  // Sorting criteria (e.g. field:asc).
  string sort = 8;
  // Set of fields to return.
  repeated string fields = 9;
}

// ArticleList is a page of articles.
message ArticleList {
  // Articles on this page.
  repeated Article items = 1;
  // Whether a next page exists.
  bool next = 2;
}

// LocateArticleRequest selects an article by etag.
message LocateArticleRequest {
  // Concurrency token / locator.
  string etag = 1;
}

// CreateArticleRequest wraps the article to create.
message CreateArticleRequest {
  // Article fields.
  InputArticle input = 1;
}

// UpdateArticleRequest wraps the etag and updated fields.
message UpdateArticleRequest {
  // Concurrency token of the article to update.
  string etag = 1;
  // Updated article fields.
  InputArticle input = 2;
}

// DeleteArticleRequest selects an article to delete.
message DeleteArticleRequest {
  // Concurrency token of the article to delete.
  string etag = 1;
}

// MoveArticleRequest reparents an article.
message MoveArticleRequest {
  // Concurrency token of the article to move.
  string etag = 1;
  // New parent id; 0 to move to top level.
  int64 new_parent_id = 2;
}

// ListChildrenRequest selects the parent article.
message ListChildrenRequest {
  // Parent article id.
  int64 id = 1;
}

// ListAncestorsRequest selects the article whose ancestors are requested.
message ListAncestorsRequest {
  // Article id.
  int64 id = 1;
}

// GetTreeRequest selects the space whose tree is requested.
message GetTreeRequest {
  // Space id.
  int64 space_id = 1;
}

// GetTreeResponse returns the root nodes of the space tree.
message GetTreeResponse {
  // Root-level tree nodes.
  repeated TreeNode nodes = 1;
}
