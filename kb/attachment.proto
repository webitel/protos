syntax = "proto3";

package webitel.kb;

option go_package = "github.com/webitel/webitel-kb/api/kb;kb";

import "general.proto";
import "google/api/annotations.proto";
import "proto/webitel/option.proto";

// Attachments manages files bound to an article, proxied to Webitel Storage.
service Attachments {
  option (option.objclass) = "kb_articles";

  // ListAttachments returns the attachments of an article.
  rpc ListAttachments(ListAttachmentsRequest) returns (AttachmentList) {
    option (google.api.http) = {
      get: "/v1/articles/{article_id}/attachments"
    };
    option (option.access) = ACTION_READ;
  }

  // CreateAttachment uploads a file and binds it to an article.
  rpc CreateAttachment(CreateAttachmentRequest) returns (Attachment) {
    option (google.api.http) = {
      post: "/v1/articles/{article_id}/attachments",
      body: "*"
    };
    option (option.access) = ACTION_UPDATE;
  }

  // DeleteAttachment removes an attachment.
  rpc DeleteAttachment(DeleteAttachmentRequest) returns (Attachment) {
    option (google.api.http) = {
      delete: "/v1/articles/{article_id}/attachments/{id}"
    };
    option (option.access) = ACTION_UPDATE;
  }
}

// Attachment is a file bound to an article.
message Attachment {
  // Unique identifier of the attachment.
  int64 id = 1;
  // Owning article id.
  int64 article_id = 2;
  // Pointer into Webitel Storage.
  string storage_uri = 3;
  // Original file name.
  string filename = 4;
  // MIME type.
  string mime_type = 5;
  // File size in bytes.
  int64 size_bytes = 6;
  // CreatedAt timestamp (epoch ms).
  int64 created_at = 20;
  // User who uploaded the attachment.
  general.Lookup created_by = 22;
}

// ListAttachmentsRequest selects the article.
message ListAttachmentsRequest {
  // Owning article id.
  int64 article_id = 1;
}

// AttachmentList is a list of attachments.
message AttachmentList {
  // Attachments of the article.
  repeated Attachment items = 1;
  // Whether a next page exists.
  bool next = 2;
}

// CreateAttachmentRequest uploads a file for an article.
message CreateAttachmentRequest {
  // Owning article id.
  int64 article_id = 1;
  // Original file name.
  string filename = 2;
  // MIME type.
  string mime_type = 3;
  // Raw file content.
  bytes content = 4;
}

// DeleteAttachmentRequest selects an attachment to delete.
message DeleteAttachmentRequest {
  // Owning article id.
  int64 article_id = 1;
  // Attachment id.
  int64 id = 2;
}
