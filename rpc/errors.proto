syntax = "proto3";

package webitel.rpc;

option go_package = "github.com/webitel/protos/gen/go/rpc;pbrpc";

// An Error. Status message details
message Error {

  // HTTP (-compatible) status code
  //  GRPC ( 0 <= code && code < 100 )
  //  HTTP ( 100 <= code && code < 600 )
  int32 code = 1;

  // A developer-facing status code, which should be in English.
  string status = 2;

  // A user-facing error message, which should be localized / by the client.
  string message = 3;

};

message MultiError {
  // Nested errors
  repeated Error errors = 1;
}